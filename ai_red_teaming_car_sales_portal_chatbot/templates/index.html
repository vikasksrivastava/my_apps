<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Sales Portal - AI Red Teaming Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #10b981;
      --accent-orange: #f59e0b;
      --bg-dark: #0f172a;
      --bg-darker: #020617;
      --bg-card: #1e293b;
      --bg-light: #f8fafc;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-dark: #1e293b;
      --border: #334155;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-dark);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .header-title h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header-title .subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .header-badge {
      background: linear-gradient(135deg, var(--accent) 0%, #059669 100%);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Main Container */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
    }

    #chat {
      flex: 1;
      background: white;
      border-radius: 16px;
      overflow-y: auto;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      border: 1px solid #e2e8f0;
    }

    .msg {
      margin: 16px 0;
      padding: 16px 20px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      max-width: 85%;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg strong {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .msg .content {
      white-space: pre-wrap;
    }

    .user {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .user strong { color: rgba(255,255,255,0.8); }

    .assistant {
      background: #f1f5f9;
      color: var(--text-dark);
      margin-right: auto;
      border-bottom-left-radius: 4px;
      border: 1px solid #e2e8f0;
    }

    .assistant strong { color: var(--primary); }

    .assistant.streaming {
      background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 18px;
      background: var(--primary);
      margin-left: 4px;
      animation: blink 0.8s infinite;
      vertical-align: text-bottom;
      border-radius: 2px;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Input Controls */
    .controls {
      display: flex;
      gap: 12px;
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid #e2e8f0;
    }

    input {
      flex: 1;
      font-family: inherit;
      font-size: 1rem;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    input:disabled {
      background: #f8fafc;
      color: var(--text-secondary);
    }

    button {
      font-family: inherit;
      padding: 14px 28px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .send-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Examples */
    .examples {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .examples-label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .pill {
      padding: 8px 14px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-dark);
      transition: all 0.2s ease;
    }

    .pill:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    /* Sidebar */
    .sidebar {
      width: 380px;
      background: var(--bg-dark);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }

    .sidebar-header {
      padding: 16px 20px;
      background: var(--bg-darker);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-header .icon {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }

    .sidebar-header.active .icon {
      background: var(--accent-orange);
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .sidebar-header h2 {
      font-size: 0.9rem;
      font-weight: 600;
      flex: 1;
    }

    .clear-btn {
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.75rem;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .clear-btn:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .status-item {
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--bg-card);
      border-radius: 12px;
      font-size: 0.85rem;
      border-left: 4px solid var(--border);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(16px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .status-item.rag { border-left-color: #8b5cf6; }
    .status-item.llm { border-left-color: #3b82f6; }
    .status-item.mcp { border-left-color: var(--accent); }
    .status-item.tool { border-left-color: var(--accent-orange); }
    .status-item.error { border-left-color: #ef4444; }
    .status-item.done { border-left-color: var(--accent); }

    .status-item .title {
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-item .title .badge {
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-item.rag .badge { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
    .status-item.llm .badge { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .status-item.mcp .badge { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .status-item.tool .badge { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    .status-item.error .badge { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    .status-item.done .badge { background: rgba(16, 185, 129, 0.2); color: #34d399; }

    .status-item .details {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      word-break: break-word;
      line-height: 1.5;
    }

    .status-item .details code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Stats Bar */
    .stats-bar {
      padding: 14px 20px;
      background: var(--bg-darker);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 24px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .stat-value {
      color: var(--text-primary);
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Footer */
    .footer {
      padding: 12px 20px;
      background: var(--bg-darker);
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .footer a {
      color: var(--primary-light);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">🚗</div>
      <div class="header-title">
        <h1>Car Sales Portal</h1>
        <div class="subtitle">AI-Powered Dealership Assistant with RAG & MCP</div>
      </div>
    </div>
    <div class="header-badge">AI Red Teaming Demo</div>
  </div>

  <div class="main-container">
    <div class="chat-area">
      <div id="chat"></div>

      <div class="controls">
        <input id="message" placeholder="Ask about inventory, financing, trade-ins, or appointments..." />
        <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
      </div>

      <div class="examples">
        <span class="examples-label">Try:</span>
        <span class="pill" onclick="fillPrompt(`Show me SUVs under $35,000 with AWD`)">SUVs under $35K</span>
        <span class="pill" onclick="fillPrompt(`Compare CS1002 and CS1005`)">Compare vehicles</span>
        <span class="pill" onclick="fillPrompt(`Estimate payment for CS1003 with $5000 down for 72 months`)">Payment estimate</span>
        <span class="pill" onclick="fillPrompt(`I want to schedule a test drive for CS1001 next Tuesday`)">Test drive</span>
        <span class="pill" onclick="fillPrompt(`What are your financing options?`)">Financing</span>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header" id="sidebarHeader">
        <div class="icon"></div>
        <h2>Activity Monitor</h2>
        <button class="clear-btn" onclick="clearStatus()">Clear</button>
      </div>
      <div class="sidebar-content" id="statusLog"></div>
      <div class="stats-bar">
        <div class="stat">RAG Queries: <span class="stat-value" id="statRag">0</span></div>
        <div class="stat">MCP Tools: <span class="stat-value" id="statTools">0</span></div>
        <div class="stat">Tokens: <span class="stat-value" id="statTokens">0</span></div>
      </div>
      <div class="footer">
        Built by <strong>Vikas Srivastava</strong> | <a href="https://github.com/vikassri">GitHub</a>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const statusLog = document.getElementById("statusLog");
    const sidebarHeader = document.getElementById("sidebarHeader");

    let stats = { rag: 0, tools: 0, tokens: 0 };
    let isStreaming = false;
    let currentAssistantDiv = null;

    function updateStats() {
      document.getElementById("statRag").textContent = stats.rag;
      document.getElementById("statTools").textContent = stats.tools;
      document.getElementById("statTokens").textContent = stats.tokens;
    }

    function addStatus(type, title, details = null) {
      const div = document.createElement("div");
      div.className = `status-item ${type}`;

      let detailsHtml = "";
      if (details) {
        const formatted = formatDetails(details);
        if (formatted) {
          detailsHtml = `<div class="details">${formatted}</div>`;
        }
      }

      div.innerHTML = `
        <div class="title">
          <span class="badge">${type}</span>
          ${escapeHtml(title)}
        </div>
        ${detailsHtml}
      `;
      statusLog.appendChild(div);
      statusLog.scrollTop = statusLog.scrollHeight;
    }

    function formatDetails(details) {
      if (!details || Object.keys(details).length === 0) return "";

      const parts = [];
      for (const [key, value] of Object.entries(details)) {
        if (value === null || value === undefined) continue;
        if (Array.isArray(value)) {
          parts.push(`<strong>${key}:</strong> ${value.join(", ")}`);
        } else if (typeof value === "object") {
          parts.push(`<strong>${key}:</strong> <code>${JSON.stringify(value)}</code>`);
        } else {
          parts.push(`<strong>${key}:</strong> <code>${value}</code>`);
        }
      }
      return parts.join(" &bull; ");
    }

    function clearStatus() {
      statusLog.innerHTML = "";
      stats = { rag: 0, tools: 0, tokens: 0 };
      updateStats();
    }

    function setStreaming(active) {
      isStreaming = active;
      input.disabled = active;
      sendBtn.disabled = active;
      if (active) {
        sidebarHeader.classList.add("active");
        sendBtn.textContent = "Processing...";
      } else {
        sidebarHeader.classList.remove("active");
        sendBtn.textContent = "Send";
      }
    }

    function add(role, text, streaming = false) {
      const div = document.createElement("div");
      div.className = `msg ${role}` + (streaming ? " streaming" : "");
      div.innerHTML = `
        <strong>${role === "user" ? "You" : "Assistant"}</strong>
        <span class="content">${escapeHtml(text)}</span>
      `;
      if (streaming) {
        div.querySelector('.content').innerHTML += '<span class="typing-cursor"></span>';
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function updateAssistantMessage(div, text, done = false) {
      const content = div.querySelector('.content');
      content.innerHTML = escapeHtml(text);
      if (!done) {
        content.innerHTML += '<span class="typing-cursor"></span>';
      }
      if (done) {
        div.classList.remove("streaming");
      }
      chat.scrollTop = chat.scrollHeight;
    }

    function fillPrompt(text) {
      if (isStreaming) return;
      input.value = text;
      input.focus();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isStreaming) return;

      add("user", text);
      input.value = "";
      setStreaming(true);

      addStatus("llm", "Starting request", { query: text.substring(0, 40) + (text.length > 40 ? "..." : "") });

      try {
        const response = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let assistantText = "";
        currentAssistantDiv = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          let eventType = "";
          for (const line of lines) {
            if (line.startsWith("event: ")) {
              eventType = line.substring(7);
            } else if (line.startsWith("data: ")) {
              const data = JSON.parse(line.substring(6));
              handleEvent(eventType, data);

              if (eventType === "content") {
                stats.tokens++;
                updateStats();
                assistantText += data.token;
                if (!currentAssistantDiv) {
                  currentAssistantDiv = add("assistant", assistantText, true);
                } else {
                  updateAssistantMessage(currentAssistantDiv, assistantText, false);
                }
              } else if (eventType === "done") {
                if (currentAssistantDiv) {
                  updateAssistantMessage(currentAssistantDiv, assistantText, true);
                } else if (assistantText === "") {
                  add("assistant", "(no response)");
                }
              }
            }
          }
        }

      } catch (e) {
        addStatus("error", "Connection error", { error: e.message });
        add("assistant", "Error contacting server.");
      } finally {
        setStreaming(false);
        currentAssistantDiv = null;
      }
    }

    function handleEvent(eventType, data) {
      switch (eventType) {
        case "status":
          handleStatusEvent(data);
          break;
        case "tool_call":
          stats.tools++;
          updateStats();
          addStatus("tool", data.message, data.details);
          break;
        case "tool_result":
          addStatus("mcp", data.message, data.details);
          break;
        case "error":
          addStatus("error", data.message);
          break;
        case "done":
          addStatus("done", "Response complete", data);
          break;
      }
    }

    function handleStatusEvent(data) {
      const typeMap = {
        "rag_start": { category: "rag", message: data.message },
        "rag_complete": { category: "rag", message: data.message, countRag: true },
        "llm_start": { category: "llm", message: data.message },
        "llm_continue": { category: "llm", message: data.message },
      };

      const mapped = typeMap[data.type];
      if (mapped) {
        addStatus(mapped.category, mapped.message, data.details);
        if (mapped.countRag) {
          stats.rag++;
          updateStats();
        }
      } else {
        addStatus("llm", data.message, data.details);
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !isStreaming) sendMessage();
    });

    // Initial status
    addStatus("done", "System ready", { model: "qwen2.5:3b", embedding: "nomic-embed-text", tools: 12 });
  </script>
</body>
</html>
