<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Sales Portal - AI Red Teaming Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #10b981;
      --accent-orange: #f59e0b;
      --accent-purple: #8b5cf6;
      --accent-blue: #3b82f6;
      --accent-red: #ef4444;
      --bg-dark: #0f172a;
      --bg-darker: #020617;
      --bg-card: #1e293b;
      --bg-light: #f8fafc;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-dark: #1e293b;
      --border: #334155;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-dark);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .header-title h1 { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
    .header-title .subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }

    .header-badge {
      background: linear-gradient(135deg, var(--accent) 0%, #059669 100%);
      color: white; padding: 6px 14px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* Main Container */
    .main-container { display: flex; flex: 1; overflow: hidden; }

    /* Chat Area */
    .chat-area {
      flex: 1; display: flex; flex-direction: column;
      padding: 20px;
      background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
    }

    #chat {
      flex: 1; background: white; border-radius: 16px;
      overflow-y: auto; padding: 20px; margin-bottom: 12px;
      box-shadow: var(--shadow); border: 1px solid #e2e8f0;
    }

    /* Messages with Markdown support */
    .msg {
      margin: 14px 0; padding: 16px 20px; border-radius: 16px;
      line-height: 1.6; font-size: 0.95rem; max-width: 88%;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg .role-label {
      display: block; font-weight: 600; margin-bottom: 8px;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em;
    }

    .msg .content { line-height: 1.7; }
    .msg .content p { margin: 0 0 12px 0; }
    .msg .content p:last-child { margin-bottom: 0; }
    .msg .content ul, .msg .content ol { margin: 8px 0 8px 20px; }
    .msg .content li { margin: 4px 0; }
    .msg .content code {
      background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.85em;
    }
    .msg .content pre {
      background: #1e293b; color: #e2e8f0; padding: 12px 16px;
      border-radius: 8px; overflow-x: auto; margin: 12px 0;
      font-family: 'JetBrains Mono', monospace; font-size: 0.85em;
    }
    .msg .content pre code { background: none; padding: 0; color: inherit; }
    .msg .content strong { font-weight: 600; }
    .msg .content h1, .msg .content h2, .msg .content h3 {
      margin: 16px 0 8px 0; font-weight: 600;
    }
    .msg .content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
    .msg .content th, .msg .content td {
      border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left;
    }
    .msg .content th { background: #f8fafc; font-weight: 600; }

    .user {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white; margin-left: auto; border-bottom-right-radius: 4px;
    }
    .user .role-label { color: rgba(255,255,255,0.7); }
    .user .content code { background: rgba(255,255,255,0.15); color: white; }
    .user .content pre { background: rgba(0,0,0,0.3); }

    .assistant {
      background: #f8fafc; color: var(--text-dark);
      margin-right: auto; border-bottom-left-radius: 4px;
      border: 1px solid #e2e8f0;
    }
    .assistant .role-label { color: var(--primary); }

    .assistant.streaming {
      background: linear-gradient(90deg, #f8fafc 0%, #f1f5f9 50%, #f8fafc 100%);
      background-size: 200% 100%; animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .typing-cursor {
      display: inline-block; width: 3px; height: 18px;
      background: var(--primary); margin-left: 4px;
      animation: blink 0.8s infinite; vertical-align: text-bottom; border-radius: 2px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    /* Input Controls */
    .controls {
      display: flex; gap: 12px; background: white; padding: 14px;
      border-radius: 16px; box-shadow: var(--shadow); border: 1px solid #e2e8f0;
    }

    input {
      flex: 1; font-family: inherit; font-size: 0.95rem;
      padding: 12px 16px; border-radius: 10px; border: 2px solid #e2e8f0;
      outline: none; transition: all 0.2s ease;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    input:disabled { background: #f8fafc; color: var(--text-secondary); }

    button {
      font-family: inherit; padding: 12px 24px; border: 0; border-radius: 10px;
      cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s ease;
    }

    .send-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .send-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4); }
    .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Examples - Scrollable grid */
    .examples-container {
      margin-top: 12px; background: white; border-radius: 12px;
      padding: 12px 16px; border: 1px solid #e2e8f0;
    }
    .examples-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .examples-label { color: var(--text-secondary); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
    .examples-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px; max-height: 140px; overflow-y: auto;
    }
    .pill {
      padding: 8px 12px; background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; cursor: pointer; font-size: 0.8rem;
      color: var(--text-dark); transition: all 0.2s ease; text-align: left;
    }
    .pill:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .pill-category {
      font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase;
      margin-bottom: 2px; font-weight: 600;
    }
    .pill:hover .pill-category { color: rgba(255,255,255,0.7); }

    /* Sidebar */
    .sidebar {
      width: 480px;
      min-width: 480px;
      max-width: 480px;
      flex-shrink: 0;
      background: var(--bg-dark);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }

    .sidebar-header {
      padding: 14px 18px;
      background: var(--bg-darker);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .sidebar-header .icon {
      width: 10px; height: 10px; background: var(--accent);
      border-radius: 50%; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }
    .sidebar-header.active .icon {
      background: var(--accent-orange);
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    .sidebar-header h2 { font-size: 0.85rem; font-weight: 600; flex: 1; }
    .clear-btn {
      background: var(--bg-card); color: var(--text-secondary);
      font-size: 0.7rem; padding: 5px 10px; border-radius: 6px;
    }
    .clear-btn:hover { background: var(--border); color: var(--text-primary); }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
    }

    /* Collapsible Status Items */
    .status-item {
      margin-bottom: 10px;
      background: var(--bg-card);
      border-radius: 10px;
      border-left: 4px solid var(--border);
      animation: slideIn 0.3s ease-out;
      overflow: hidden;
      flex-shrink: 0;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

    .status-item.pipeline { border-left-color: var(--primary); }
    .status-item.rag { border-left-color: var(--accent-purple); }
    .status-item.llm { border-left-color: var(--accent-blue); }
    .status-item.mcp { border-left-color: var(--accent); }
    .status-item.tool { border-left-color: var(--accent-orange); }
    .status-item.error { border-left-color: var(--accent-red); }
    .status-item.done { border-left-color: var(--accent); }

    .status-header {
      padding: 12px 14px; cursor: pointer; display: flex;
      align-items: flex-start; gap: 10px; user-select: none;
    }
    .status-header:hover { background: rgba(255,255,255,0.03); }

    .status-toggle {
      width: 18px; height: 18px; display: flex; align-items: center;
      justify-content: center; font-size: 10px; color: var(--text-secondary);
      transition: transform 0.2s ease; flex-shrink: 0; margin-top: 2px;
    }
    .status-item.expanded .status-toggle { transform: rotate(90deg); }

    .status-title { flex: 1; }
    .status-title .badge {
      display: inline-block; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      font-family: 'JetBrains Mono', monospace; margin-right: 8px;
    }
    .status-item.pipeline .badge { background: rgba(99, 102, 241, 0.2); color: var(--primary-light); }
    .status-item.embed .badge { background: rgba(236, 72, 153, 0.2); color: #f472b6; }
    .status-item.rag .badge { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
    .status-item.context .badge { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
    .status-item.llm .badge { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .status-item.stream .badge { background: rgba(14, 165, 233, 0.2); color: #38bdf8; }
    .status-item.loop .badge { background: rgba(251, 146, 60, 0.2); color: #fb923c; }
    .status-item.mcp .badge { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .status-item.tool .badge { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    .status-item.error .badge { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    .status-item.done .badge { background: rgba(16, 185, 129, 0.2); color: #34d399; }

    .status-message { font-size: 0.8rem; font-weight: 500; color: var(--text-primary); }
    .status-explanation {
      font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;
      line-height: 1.5;
    }

    .status-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(0,0,0,0.2);
    }
    .status-item.expanded .status-body {
      max-height: 800px;
      overflow-y: auto;
    }

    .status-details {
      padding: 12px 14px; font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace; color: var(--text-secondary);
    }

    .detail-row { margin-bottom: 8px; }
    .detail-label { color: var(--accent); font-weight: 600; display: block; margin-bottom: 2px; }
    .detail-value {
      color: var(--text-primary); background: rgba(0,0,0,0.3);
      padding: 6px 10px; border-radius: 6px; display: block;
      word-break: break-all; white-space: pre-wrap;
    }
    .detail-value.curl, .detail-value.curl-cmd {
      color: #fbbf24; font-size: 0.7rem; max-height: 120px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; background: rgba(0,0,0,0.5);
    }
    .detail-value.python-code {
      color: #60a5fa; font-size: 0.7rem; max-height: 150px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; background: rgba(0,0,0,0.5);
    }
    .detail-value.json, .detail-value.json-block {
      color: #34d399; max-height: 200px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      background: rgba(0,0,0,0.5);
    }
    .detail-value.number-array {
      color: #f472b6; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
    }
    .detail-value.result-full {
      color: #a5f3fc; max-height: 200px; overflow-y: auto;
      background: rgba(0,0,0,0.4);
    }
    .detail-value.explanation-text {
      color: #fde68a; font-style: italic; line-height: 1.5;
    }
    .detail-value.results-list { background: none; padding: 4px 0; }
    .detail-value.results-list .result-item {
      background: rgba(0,0,0,0.3); margin-bottom: 8px; padding: 10px;
      border-radius: 6px; border-left: 3px solid var(--accent-purple);
    }
    .detail-value.results-list .result-rank {
      color: var(--accent-purple); font-weight: 600; margin-bottom: 4px;
    }
    .detail-value.results-list .result-content {
      color: var(--text-secondary); font-size: 0.75rem; line-height: 1.4;
    }
    .detail-value.learning-list { background: none; padding: 4px 0; }
    .detail-value.learning-list .learning-item {
      color: #34d399; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .detail-value.messages-list { background: none; padding: 4px 0; }
    .detail-value.messages-list .message-item {
      padding: 6px 10px; margin-bottom: 4px; border-radius: 4px;
      font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
    }
    .detail-value.messages-list .message-item.user { background: rgba(99, 102, 241, 0.2); color: var(--primary-light); }
    .detail-value.messages-list .message-item.assistant { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .detail-value.messages-list .message-item.tool { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    .detail-value.messages-list .message-item.system { background: rgba(148, 163, 184, 0.2); color: var(--text-secondary); }
    .detail-value.list { display: flex; flex-wrap: wrap; gap: 4px; background: none; padding: 4px 0; }
    .detail-value.list span, .detail-value.list .list-item {
      background: rgba(99, 102, 241, 0.2); color: var(--primary-light);
      padding: 2px 8px; border-radius: 4px; font-size: 0.7rem;
    }

    /* Stats Bar */
    .stats-bar {
      padding: 12px 18px; background: var(--bg-darker);
      border-top: 1px solid var(--border);
      display: flex; gap: 20px; flex-wrap: wrap;
    }
    .stat { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-secondary); }
    .stat-value { color: var(--text-primary); font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    /* Footer */
    .footer {
      padding: 10px 18px; background: var(--bg-darker);
      border-top: 1px solid var(--border);
      text-align: center; font-size: 0.7rem; color: var(--text-secondary);
    }
    .footer a { color: var(--primary-light); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">🚗</div>
      <div class="header-title">
        <h1>Car Sales Portal</h1>
        <div class="subtitle">AI-Powered Assistant with RAG & MCP Tools</div>
      </div>
    </div>
    <div class="header-badge">AI Red Teaming Demo</div>
  </div>

  <div class="main-container">
    <div class="chat-area">
      <div id="chat"></div>

      <div class="controls">
        <input id="message" placeholder="Ask about inventory, financing, trade-ins, or schedule appointments..." />
        <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
      </div>

      <div class="examples-container">
        <div class="examples-header">
          <span class="examples-label">Try These Examples</span>
        </div>
        <div class="examples-grid" id="examplesGrid"></div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header" id="sidebarHeader">
        <div class="icon"></div>
        <h2>Activity Monitor</h2>
        <button class="clear-btn" onclick="clearStatus()">Clear</button>
      </div>
      <div class="sidebar-content" id="statusLog"></div>
      <div class="stats-bar">
        <div class="stat">RAG: <span class="stat-value" id="statRag">0</span></div>
        <div class="stat">Tools: <span class="stat-value" id="statTools">0</span></div>
        <div class="stat">Tokens: <span class="stat-value" id="statTokens">0</span></div>
        <div class="stat">Iterations: <span class="stat-value" id="statIterations">0</span></div>
      </div>
      <div class="footer">
        Built by <strong>Vikas Srivastava</strong> | <a href="https://github.com/vikassri" target="_blank">GitHub</a>
      </div>
    </div>
  </div>

  <script>
    // Example prompts organized by category
    const examplePrompts = [
      // Inventory
      { category: "Inventory", text: "Show me all SUVs under $35,000 with AWD" },
      { category: "Inventory", text: "What sedans do you have available?" },
      { category: "Inventory", text: "List all electric vehicles in stock" },
      { category: "Inventory", text: "Show me trucks with less than 30,000 miles" },
      { category: "Inventory", text: "What's your cheapest car?" },
      { category: "Inventory", text: "Do you have any hybrid vehicles?" },
      { category: "Inventory", text: "Show vehicles under $25,000" },
      { category: "Inventory", text: "What Toyota models do you have?" },

      // Vehicle Details
      { category: "Details", text: "Tell me about vehicle CS1001" },
      { category: "Details", text: "What features does CS1003 have?" },
      { category: "Details", text: "Is CS1005 still available?" },
      { category: "Details", text: "What's the mileage on CS1002?" },

      // Comparison
      { category: "Compare", text: "Compare CS1002 and CS1005" },
      { category: "Compare", text: "Compare CS1001, CS1003, and CS1004" },
      { category: "Compare", text: "Which is better: CS1002 or CS1006?" },
      { category: "Compare", text: "Compare all your SUVs" },

      // Financing
      { category: "Finance", text: "Estimate payment for CS1003 with $5000 down for 72 months" },
      { category: "Finance", text: "What financing options do you offer?" },
      { category: "Finance", text: "Calculate monthly payment for a $30,000 car" },
      { category: "Finance", text: "What's the APR for a 60-month loan?" },
      { category: "Finance", text: "How much would CS1001 cost per month?" },

      // Trade-In
      { category: "Trade-In", text: "Estimate trade-in for my 2019 Honda Civic with 45,000 miles" },
      { category: "Trade-In", text: "What's my 2020 Toyota Camry worth?" },
      { category: "Trade-In", text: "Trade-in value for a 2018 Ford F-150 in good condition" },
      { category: "Trade-In", text: "How do you evaluate trade-ins?" },

      // Scheduling
      { category: "Schedule", text: "Schedule a test drive for CS1001 next Tuesday at 2pm" },
      { category: "Schedule", text: "I want to test drive the Model 3" },
      { category: "Schedule", text: "Can I schedule a test drive for this weekend?" },

      // General Info
      { category: "Info", text: "What are your business hours?" },
      { category: "Info", text: "What's your return policy?" },
      { category: "Info", text: "Do you offer warranties?" },
      { category: "Info", text: "Where are you located?" },
      { category: "Info", text: "What EV charging options do you have?" },

      // Complex Queries
      { category: "Complex", text: "I need an AWD SUV under $40k with good fuel economy" },
      { category: "Complex", text: "Help me find a family car with the best warranty" },
      { category: "Complex", text: "What's the total cost of CS1003 including tax and fees?" },
      { category: "Complex", text: "I'm trading in my car and want to finance the rest" },
    ];

    const chat = document.getElementById("chat");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const statusLog = document.getElementById("statusLog");
    const sidebarHeader = document.getElementById("sidebarHeader");
    const examplesGrid = document.getElementById("examplesGrid");

    let stats = { rag: 0, tools: 0, tokens: 0, iterations: 0 };
    let isStreaming = false;
    let currentAssistantDiv = null;

    // Initialize marked.js
    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false
    });

    // Populate example prompts
    function initExamples() {
      examplesGrid.innerHTML = examplePrompts.map(p => `
        <div class="pill" onclick="fillPrompt(\`${p.text}\`)">
          <div class="pill-category">${p.category}</div>
          <div>${p.text.length > 35 ? p.text.substring(0, 35) + '...' : p.text}</div>
        </div>
      `).join('');
    }
    initExamples();

    function updateStats() {
      document.getElementById("statRag").textContent = stats.rag;
      document.getElementById("statTools").textContent = stats.tools;
      document.getElementById("statTokens").textContent = stats.tokens;
      document.getElementById("statIterations").textContent = stats.iterations;
    }

    function addStatus(type, message, explanation = "", details = null) {
      const div = document.createElement("div");
      div.className = `status-item ${type}`;

      const hasDetails = details && Object.keys(details).length > 0;

      div.innerHTML = `
        <div class="status-header" onclick="toggleStatus(this)">
          <div class="status-toggle">${hasDetails ? '▶' : ''}</div>
          <div class="status-title">
            <span class="badge">${type}</span>
            <div class="status-message">${escapeHtml(message)}</div>
            ${explanation ? `<div class="status-explanation">${escapeHtml(explanation)}</div>` : ''}
          </div>
        </div>
        ${hasDetails ? `<div class="status-body"><div class="status-details">${formatDetails(details)}</div></div>` : ''}
      `;

      statusLog.appendChild(div);
      statusLog.scrollTop = statusLog.scrollHeight;
    }

    function toggleStatus(header) {
      const item = header.closest('.status-item');
      item.classList.toggle('expanded');
    }

    function formatDetails(details) {
      if (!details || Object.keys(details).length === 0) return "";

      let html = '';
      for (const [key, value] of Object.entries(details)) {
        if (value === null || value === undefined) continue;

        html += `<div class="detail-row">`;
        html += `<span class="detail-label">${formatKey(key)}</span>`;

        if (key === 'curl_command' || key === 'curl_equivalent') {
          // Format curl commands with syntax highlighting
          html += `<span class="detail-value curl-cmd">${escapeHtml(String(value))}</span>`;
        } else if (key === 'equivalent_python' || key === 'python_mcp_call') {
          // Format Python code
          html += `<span class="detail-value python-code">${escapeHtml(String(value))}</span>`;
        } else if (key === 'mcp_json_rpc' || key === 'mcp_request_full' || key === 'mcp_response_full' ||
                   key === 'full_request_body' || key === 'arguments' || key === 'arguments_provided' ||
                   key === 'tool_parameters_schema' || key === 'architecture' || key === 'prompt_structure' ||
                   key === 'chromadb_query' || key === 'chromadb_raw_response' || key === 'api_response_format' ||
                   key === 'stdio_communication' || key === 'mcp_protocol' || key === 'conversation_injection' ||
                   key === 'tool_definitions' || key === 'timing' || key === 'pipeline_summary' ||
                   key === 'conversation_state' || key === 'embedding_stats') {
          // Format JSON objects with pretty printing
          html += `<span class="detail-value json-block">${escapeHtml(JSON.stringify(value, null, 2))}</span>`;
        } else if (key === 'results' && Array.isArray(value)) {
          // Format RAG results specially
          html += `<span class="detail-value results-list">`;
          for (const result of value) {
            html += `<div class="result-item">`;
            html += `<div class="result-rank">#${result.rank} - ${result.source} (similarity: ${(result.similarity_score * 100).toFixed(1)}%)</div>`;
            html += `<div class="result-content">${escapeHtml(result.content_preview || '')}</div>`;
            html += `</div>`;
          }
          html += `</span>`;
        } else if (key === 'what_you_learned' && Array.isArray(value)) {
          // Format learning points
          html += `<span class="detail-value learning-list">`;
          for (const item of value) {
            html += `<div class="learning-item">${escapeHtml(item)}</div>`;
          }
          html += `</span>`;
        } else if (key === 'recent_messages' && Array.isArray(value)) {
          // Format recent messages
          html += `<span class="detail-value messages-list">`;
          for (const msg of value) {
            html += `<div class="message-item ${msg.role}">[${msg.role}] ${escapeHtml(msg.content || '(tool call)')}</div>`;
          }
          html += `</span>`;
        } else if (Array.isArray(value)) {
          if (value.length > 0 && typeof value[0] === 'number') {
            // Format number arrays (like embedding previews)
            html += `<span class="detail-value number-array">[${value.slice(0, 10).map(v => typeof v === 'number' ? v.toFixed(6) : v).join(', ')}${value.length > 10 ? `, ... (${value.length} total)` : ''}]</span>`;
          } else {
            html += `<span class="detail-value list">${value.map(v => `<span class="list-item">${escapeHtml(typeof v === 'object' ? JSON.stringify(v) : String(v))}</span>`).join('')}</span>`;
          }
        } else if (typeof value === 'object') {
          html += `<span class="detail-value json-block">${escapeHtml(JSON.stringify(value, null, 2))}</span>`;
        } else if (key === 'result_full' || key === 'augmented_message_full') {
          const strVal = String(value);
          html += `<span class="detail-value result-full">${escapeHtml(strVal)}</span>`;
        } else if (key === 'explanation' || key === 'why_this_step' || key === 'why_agentic') {
          html += `<span class="detail-value explanation-text">${escapeHtml(String(value))}</span>`;
        } else {
          html += `<span class="detail-value">${escapeHtml(String(value))}</span>`;
        }

        html += `</div>`;
      }
      return html;
    }

    function formatKey(key) {
      return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function clearStatus() {
      statusLog.innerHTML = "";
      stats = { rag: 0, tools: 0, tokens: 0, iterations: 0 };
      updateStats();
      loadTools();
    }

    function setStreaming(active) {
      isStreaming = active;
      input.disabled = active;
      sendBtn.disabled = active;
      if (active) {
        sidebarHeader.classList.add("active");
        sendBtn.textContent = "Processing...";
      } else {
        sidebarHeader.classList.remove("active");
        sendBtn.textContent = "Send";
      }
    }

    function add(role, text, streaming = false) {
      const div = document.createElement("div");
      div.className = `msg ${role}` + (streaming ? " streaming" : "");

      const renderedContent = role === 'assistant' ? marked.parse(text) : escapeHtml(text);

      div.innerHTML = `
        <span class="role-label">${role === "user" ? "You" : "Assistant"}</span>
        <div class="content">${renderedContent}</div>
      `;

      if (streaming) {
        div.querySelector('.content').innerHTML += '<span class="typing-cursor"></span>';
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function updateAssistantMessage(div, text, done = false) {
      const content = div.querySelector('.content');
      content.innerHTML = marked.parse(text);
      if (!done) {
        content.innerHTML += '<span class="typing-cursor"></span>';
      }
      if (done) {
        div.classList.remove("streaming");
      }
      chat.scrollTop = chat.scrollHeight;
    }

    function fillPrompt(text) {
      if (isStreaming) return;
      input.value = text;
      input.focus();
    }

    async function loadTools() {
      try {
        const res = await fetch('/api/tools');
        const data = await res.json();
        addStatus('pipeline', `System Ready - ${data.count} MCP Tools Available`,
          'The MCP server is connected and tools are loaded. Click to see all available tools.',
          {
            tools_count: data.count,
            available_tools: data.tools.map(t => t.name),
            model: 'qwen2.5:3b',
            embedding_model: 'nomic-embed-text',
            vector_store: 'ChromaDB'
          }
        );
      } catch (e) {
        addStatus('error', 'Failed to load tools', e.message);
      }
    }
    loadTools();

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isStreaming) return;

      add("user", text);
      input.value = "";
      setStreaming(true);

      try {
        const response = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let assistantText = "";
        currentAssistantDiv = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          let eventType = "";
          for (const line of lines) {
            if (line.startsWith("event: ")) {
              eventType = line.substring(7);
            } else if (line.startsWith("data: ")) {
              try {
                const data = JSON.parse(line.substring(6));
                handleEvent(eventType, data);

                if (eventType === "content") {
                  stats.tokens++;
                  updateStats();
                  assistantText += data.token;
                  if (!currentAssistantDiv) {
                    currentAssistantDiv = add("assistant", assistantText, true);
                  } else {
                    updateAssistantMessage(currentAssistantDiv, assistantText, false);
                  }
                } else if (eventType === "done") {
                  if (currentAssistantDiv) {
                    updateAssistantMessage(currentAssistantDiv, assistantText, true);
                  } else if (assistantText === "") {
                    add("assistant", "(no response)");
                  }
                  if (data.total_tool_iterations) {
                    stats.iterations = data.total_tool_iterations;
                    updateStats();
                  }
                }
              } catch (e) {
                console.error('Parse error:', e);
              }
            }
          }
        }

      } catch (e) {
        addStatus("error", "Connection error", e.message);
        add("assistant", "Error contacting server.");
      } finally {
        setStreaming(false);
        currentAssistantDiv = null;
      }
    }

    function handleEvent(eventType, data) {
      const explanation = data.explanation || '';
      const message = data.message || eventType;
      const details = data.details || {};

      switch (eventType) {
        case "pipeline_start":
          addStatus("pipeline", message, explanation, details);
          break;
        case "embedding_start":
          addStatus("embed", message, explanation, details);
          break;
        case "embedding_complete":
          addStatus("embed", message, explanation, details);
          break;
        case "rag_start":
          addStatus("rag", message, explanation, details);
          break;
        case "rag_complete":
          stats.rag++;
          updateStats();
          addStatus("rag", message, explanation, details);
          break;
        case "context_injection":
          addStatus("context", message, explanation, details);
          break;
        case "llm_start":
          addStatus("llm", message, explanation, details);
          break;
        case "llm_continue":
          addStatus("llm", message, explanation, details);
          break;
        case "streaming_start":
          addStatus("stream", message, explanation, details);
          break;
        case "tool_loop_start":
          addStatus("loop", message, explanation, details);
          break;
        case "tool_call":
          stats.tools++;
          updateStats();
          addStatus("tool", message, explanation, details);
          break;
        case "tool_result":
          addStatus("mcp", message, explanation, details);
          break;
        case "error":
          addStatus("error", message, explanation, details);
          break;
        case "done":
          addStatus("done", message, explanation, details);
          break;
        default:
          if (data.type) {
            addStatus(data.type.split('_')[0] || 'llm', message, explanation, details);
          }
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !isStreaming) sendMessage();
    });
  </script>
</body>
</html>
